# Render blueprint for the HoopIQ FastAPI backend.
# In Render: New + → Blueprint → connect this repo. Render reads this file.
# After it deploys, set the two secret env vars (ANTHROPIC_API_KEY, CORS_ORIGINS)
# in the dashboard — they're marked sync:false so they are NOT stored in git.
services:
  - type: web
    name: hoopiq-api
    runtime: python
    rootDir: services/api
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: PREFER_CACHE
        value: "true"   # cloud serves pre-computed snapshots (NBA blocks cloud IPs)
      - key: ANTHROPIC_API_KEY
        sync: false   # set in dashboard — your real Claude key
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://your-app.vercel.app
